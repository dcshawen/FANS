name: FANS-Dev

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: FANS-React-Dev
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
  db:
    image: mariadb:10.11
    container_name: FANS-MariaDB
    env_file:
      - ./backend/db.env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/initdb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - fans-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: FANS-FastAPI-Dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on: 
      db:
        condition: service_healthy
    networks: 
      - fans-network

networks: 
  fans-network:
    driver: bridge

volumes:
  db_data:

