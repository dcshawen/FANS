name: FANS-Dev

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: FANS-React-Dev
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - ./frontend/public:/app/public
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: FANTS-FastAPI-Dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on: 
      - db
    networks: 
      - fans-network
  db:
    image: mariadb:10.11
    container_name: FANS-MariaDB
    env_file:
      - ./backend/db.env
    ports:
      - "3306:3306"
    volumes:
      - ./backend/db_data:/var/lib/mysql
      - ./backend/initdb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks: 
      - fans-network

networks: 
  fans-network:
    driver: bridge
  db:
    image: mariadb:10.11
    container_name: FANS-MariaDB
    env_file:
      - ./backend/db.env
    ports:
      - "3306:3306"
    volumes:
      - ./backend/db_data:/var/lib/mysql
      - ./backend/initdb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
  db:
    image: mariadb:10.11
    container_name: FANS-MariaDB
    env_file:
      - ./backend/db.env
    ports:
      - "3306:3306"
    volumes:
      - ./backend/db_data:/var/lib/mysql
      - ./backend/initdb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
