name: FANS-Dev

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: FANS-React-Dev
    ports:
      - "5173:5173"
    volumes:
      - /${PWD}/frontend:/app
      - /app/node_modules
  db:
    image: mariadb:10.11
    container_name: FANS-MariaDB
    env_file:
      - ./backend/db.env
    ports:
      - "3306:3306"
    volumes:
      - ./backend/db_data:/var/lib/mysql
      - ./backend/initdb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
